{{ define "main" }}
<div class="p-2 max-w-screen-xl mx-auto">
  <header class="max-w-screen-xl prose lg:prose-xl dark:prose-invert">
    <h1 class="flex items-center">
      <i class="fab fa-spotify text-4xl text-emerald-500 mr-3"></i>
      {{ .Title }}
    </h1>
    {{ .Content }}
  </header>
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4 mt-4">
    {{ $artists := (.Pages.ByParam "total_plays").Reverse }}
    {{ $paginator := .Paginate $artists }}
    {{ range $paginator.Pages }}
      {{- partial "card-artist.html" . -}}
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
